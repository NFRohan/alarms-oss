<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ffff00",
                        "background-light": "#f8f8f5",
                        "background-dark": "#23230f",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                },
            },
        }
    </script>
<style>
        .neo-brutal-shadow {
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
        }
        .neo-brutal-border {
            border: 4px solid black;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-screen w-full max-w-[440px] mx-auto flex-col overflow-x-hidden border-x-4 border-black bg-background-light dark:bg-background-dark">
<!-- Top Alarm Status Bar -->
<div class="flex items-center bg-primary p-4 border-b-4 border-black justify-between">
<div class="text-black flex size-12 shrink-0 items-center justify-center neo-brutal-border bg-white rounded-none" data-icon="Alarm">
<span class="material-symbols-outlined text-3xl font-bold">alarm_on</span>
</div>
<h2 class="text-black text-xl font-black leading-tight uppercase tracking-tighter flex-1 text-center">Alarm Ringing</h2>
<div class="size-12"></div> <!-- Spacer -->
</div>
<main class="flex-1 flex flex-col p-6 gap-8">
<!-- Main Mission Title -->
<div class="space-y-2">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tighter text-5xl font-black leading-none uppercase italic border-b-8 border-primary inline-block">
                    Steps Mission
                </h1>
<p class="text-lg font-bold uppercase tracking-widest text-slate-600 dark:text-slate-400">Walk to turn off</p>
</div>
<!-- Stats Card -->
<div class="grid grid-cols-1 gap-6">
<div class="flex flex-col gap-4 bg-white dark:bg-slate-800 p-6 neo-brutal-border neo-brutal-shadow">
<div class="flex items-center justify-between">
<p class="text-slate-900 dark:text-slate-100 text-xl font-black uppercase">Target</p>
<span class="material-symbols-outlined text-primary bg-black p-1">flag</span>
</div>
<p class="text-slate-900 dark:text-slate-100 tracking-tighter text-4xl font-black">50 STEPS</p>
</div>
<!-- Live Counter -->
<div class="flex flex-col items-center justify-center gap-4 bg-primary p-8 neo-brutal-border neo-brutal-shadow">
<h2 class="text-black text-xl font-black uppercase tracking-widest">Live Progress</h2>
<div class="text-black tracking-tighter text-7xl font-black leading-none">
                        12 <span class="text-3xl opacity-50">/ 50</span>
</div>
</div>
</div>
<!-- Chunky Progress Bar -->
<div class="space-y-3">
<div class="h-10 w-full bg-white dark:bg-slate-700 neo-brutal-border overflow-hidden">
<div class="h-full bg-primary border-r-4 border-black" style="width: 24%;"></div>
</div>
<div class="flex justify-between font-black text-sm uppercase tracking-tighter">
<span>Just started</span>
<span>24% Complete</span>
</div>
</div>
<!-- Permission/Status Message -->
<div class="mt-auto bg-black text-primary p-4 neo-brutal-border flex items-center gap-4">
<span class="material-symbols-outlined animate-pulse">motion_sensor_active</span>
<p class="text-sm font-bold uppercase leading-tight">Motion permission active. Keep moving to disable alarm.</p>
</div>
</main>
<!-- Footer Button Area -->
<div class="p-6 pt-0">
<button class="w-full bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 p-5 neo-brutal-border neo-brutal-shadow font-black uppercase text-xl hover:translate-x-1 hover:translate-y-1 hover:shadow-none transition-all">
                Emergency Dismiss
            </button>
</div>
</div>
</body></html>
